name: PLATFORM UI CI
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [main]

jobs:
  # -----------------------
  # 1. BUILD AND VALIDATE
  # -----------------------
  build-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 4. Lint (optional but recommended)
      - name: Run lint
        run: npm run lint || echo "No lint configured"

      #debug
      - name: Debug Paths
        run: ls -R projects/

      # 5. Build (Host)
      - name: Build the project
        # run: npx ng build shell --configuration production
        # run: cd projects/shell && npx ng build --configuration production
        run: ng build shell

      # 6. Build Products MFE
      - name: Build Products 
        # run: npx ng build products --configuration production 
        run: npm run build:products
      # 7. Build Orders MFE
      - name: Build Orders 
        # run: npx ng build orders --configuration production
        run: npm run build:orders

      # 8. Verify dist output (debug safety)
      - name: List dist contents
        run: |
          echo "Shell dist:"
          ls -R dist/shell
          echo "Products dist:"
          ls -R dist/products
          echo "Orders dist:"
          ls -R dist/orders

